<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Карта Логиста</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <style>
        #map {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* Стиль для попапов */
        .driver-popup {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

    <script>
        // --- ИНИЦИАЛИЗАЦИЯ КАРТЫ ---
        var map = L.map('map').setView([52.0976, 23.7341], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // --- ИНСТРУМЕНТЫ РИСОВАНИЯ (GEOMAN) ---
        map.pm.addControls({
            position: 'topleft',
            drawCircle: false,
            drawCircleMarker: false,
            drawRectangle: false,
            drawPolygon: false,
            drawMarker: false,
            drawPolyline: true,
            editMode: true,
            dragMode: false,
            cutPolygon: false,
            removalMode: true
        });

        // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
        var marker, routeLayer, startMarker, endMarker;

        // Хранилище маркеров водителей: { "guid-водителя": L.Marker }
        var drivers = {};

        // Иконка грузовика
        var truckIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/741/741407.png', // Или локальный путь
            iconSize: [32, 32],
            iconAnchor: [16, 16],
            popupAnchor: [0, -16]
        });


        window.addDriver = function (deviceId, name, lat, lon, plate) {
            try {
                // Проверка: если такой водитель уже есть по ID, не создаем дубликат
                if (drivers[deviceId]) {
                    window.moveDriver(deviceId, lat, lon);
                    return;
                }

                var popupContent = "<div class='driver-popup'>" +
                    "<b>👤 " + (name || "Без имени") + "</b><br>" +
                    "🚛 " + (plate || "Нет номера") +
                    "</div>";

                var newMarker = L.marker([lat, lon], { icon: truckIcon })
                    .addTo(map)
                    .bindPopup(popupContent);

                // ВАЖНО: Сохраняем по ID, а не по имени!
                drivers[deviceId] = newMarker;

                console.log("Водитель добавлен: " + deviceId);
            } catch (e) { console.error("Ошибка addDriver: " + e); }
        };

        // 2. Двигать водителя
        // Теперь принимаем deviceId вместо name
        window.moveDriver = function (deviceId, lat, lon) {
            try {
                // ВАЖНО: Ищем по ID
                var m = drivers[deviceId];
                if (m) {
                    m.setLatLng([lat, lon]);
                } else {
                    // Если маркера нет (например, страница перезагрузилась), 
                    // мы не можем вызвать addDriver, так как у нас тут нет 'name' и 'plate'.
                    // Поэтому просто ничего не делаем или пишем в лог.
                    console.warn("Маркер для движения не найден: " + deviceId);
                }
            } catch (e) { console.error("Ошибка moveDriver: " + e); }
        };

        // 3. Удалить водителя
        window.removeDriver = function (deviceId) {
            try {
                // ВАЖНО: Ищем по ID (это у вас уже было правильно)
                if (drivers[deviceId]) {
                    map.removeLayer(drivers[deviceId]);
                    delete drivers[deviceId];
                    console.log("Водитель удален: " + deviceId);
                } else {
                    console.log("Нечего удалять, ID не найден: " + deviceId);
                }
            } catch (e) {
                console.error("Ошибка при удалении водителя: " + e);
            }
        }

        // --- ЛОГИКА КЛИКА ПО КАРТЕ (ПОЛУЧЕНИЕ АДРЕСА) ---
        function setMarker(lat, lon, displayName) {
            if (marker) {
                map.removeLayer(marker);
            }
            marker = L.marker([lat, lon]).addTo(map);
            marker.bindPopup(displayName).openPopup();
        }

        map.on('click', function (e) {
            var lat = e.latlng.lat;
            var lon = e.latlng.lng;

            // Используем Nominatim для обратного геокодинга
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
                .then(response => response.json())
                .then(data => {
                    var address = data.display_name || "Адрес не найден";
                    setMarker(lat, lon, address);
                })
                .catch(error => {
                    setMarker(lat, lon, "Ошибка при получении адреса");
                });
        });

        function getSelectedLocation() {
            if (marker) {
                return JSON.stringify({
                    lat: marker.getLatLng().lat,
                    lon: marker.getLatLng().lng,
                    address: marker.getPopup().getContent()
                });
            } else {
                return JSON.stringify({ error: "Маркер не установлен" });
            }
        }


        // --- ЛОГИКА ОТОБРАЖЕНИЯ МАРШРУТА (ИЗ БД) ---
        window.displayRoute = function (geoJson) {
            try {
                // Очистка старого маршрута
                if (routeLayer) map.removeLayer(routeLayer);
                if (startMarker) map.removeLayer(startMarker);
                if (endMarker) map.removeLayer(endMarker);

                var data = typeof geoJson === 'string' ? JSON.parse(geoJson) : geoJson;

                routeLayer = L.geoJSON(data, {
                    style: {
                        color: '#3388ff',
                        weight: 5,
                        opacity: 0.8
                    },
                    onEachFeature: function (feature, layer) {
                        if (layer.pm) {
                            layer.pm.enable({
                                allowSelfIntersection: true,
                                draggable: false
                            });
                        }
                    }
                }).addTo(map);

                // Ставим маркеры начала и конца
                if (data.features && data.features.length > 0 && data.features[0].geometry.type === "LineString") {
                    var coords = data.features[0].geometry.coordinates;
                    if (coords.length > 1) {
                        var start = coords[0];
                        startMarker = L.marker([start[1], start[0]]).bindPopup("Начало").addTo(map);

                        var end = coords[coords.length - 1];
                        endMarker = L.marker([end[1], end[0]]).bindPopup("Конец").addTo(map);
                    }
                }

                // Зум на маршрут
                var bounds = routeLayer.getBounds();
                if (bounds.isValid()) {
                    map.fitBounds(bounds);
                }
            } catch (e) {
                console.error("Ошибка в displayRoute:", e.message);
            }
        };

        // --- ЛОГИКА СОХРАНЕНИЯ ИЗМЕНЕННОГО МАРШРУТА ---
        window.getEditedRouteGeoJson = function () {
            try {
                var features = [];
                map.eachLayer(function (layer) {
                    // Фильтруем слои: берем только то, что можно сохранить в GeoJSON
                    // Исключаем тайлы, временные слои Geoman и маркеры водителей (drivers)
                    var isDriver = false;

                    // Проверяем, не является ли этот слой маркером водителя
                    for (var key in drivers) {
                        if (drivers[key] === layer) {
                            isDriver = true;
                            break;
                        }
                    }

                    if (layer.toGeoJSON && !layer._pmTempLayer && !(layer instanceof L.TileLayer) && !isDriver && layer !== marker && layer !== startMarker && layer !== endMarker) {
                        var geo = layer.toGeoJSON();
                        if (geo.type === 'FeatureCollection') {
                            features = features.concat(geo.features);
                        } else {
                            features.push(geo);
                        }
                    }
                });

                var collection = {
                    "type": "FeatureCollection",
                    "features": features
                };

                return JSON.stringify(collection);
            } catch (e) {
                return JSON.stringify({ error: e.message });
            }
        };
    </script>
</body>
</html>
