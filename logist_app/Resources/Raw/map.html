<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Карта Логиста</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <style>
        #map {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* Стиль для попапов */
        .driver-popup {
            font-weight: bold;
            color: #333;
        }


        .marker-yellow {
            background-color: #f1c40f !important; /* Приятный желтый */
            color: #333 !important; /* Темный текст для контраста */
            border: 2px solid #f39c12 !important; /* Чуть более темная рамка */
        }

        /* Оранжевый цвет для IsPrivate = true (частники) */
        .marker-orange {
            background-color: #e67e22 !important; /* Яркий оранжевый */
            color: #fff !important; /* Белый текст */
            border: 2px solid #d35400 !important; /* Темно-оранжевая рамка */
        }

        /* НОВЫЙ СТИЛЬ ДЛЯ МАРКЕРА С ЦИФРОЙ */
        .custom-point-marker {
            background-color: #ff0000; /* Красный фон */
            color: white; /* Белый текст */
            border: 2px solid #000; /* Черная обводка */
            border-radius: 50%; /* Закругляем до идеального круга */
            text-align: center; /* Текст по центру горизонтально */
            line-height: 24px; /* Текст по центру вертикально */
            font-size: 13px; /* Размер цифры */
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5); /* Небольшая тень */
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

    <script>
        // --- ИНИЦИАЛИЗАЦИЯ КАРТЫ ---
        var map = L.map('map').setView([52.0976, 23.7341], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // --- ИНСТРУМЕНТЫ РИСОВАНИЯ (GEOMAN) ---
        map.pm.addControls({
            position: 'topleft',
            drawCircle: false,
            drawCircleMarker: false,
            drawRectangle: false,
            drawPolygon: false,
            drawMarker: false,
            drawPolyline: true,
            editMode: true,
            dragMode: false,
            cutPolygon: false,
            removalMode: true
        });

        // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
        var marker, routeLayer, startMarker, endMarker;

        // Хранилище маркеров водителей: { "guid-водителя": L.Marker }
        var drivers = {};

        // Иконка грузовика
        var truckIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/741/741407.png', // Или локальный путь
            iconSize: [32, 32],
            iconAnchor: [16, 16],
            popupAnchor: [0, -16]
        });


        window.addDriver = function (deviceId, name, lat, lon, plate) {
            try {
                // Проверка: если такой водитель уже есть по ID, не создаем дубликат
                if (drivers[deviceId]) {
                    window.moveDriver(deviceId, lat, lon);
                    return;
                }

                var popupContent = "<div class='driver-popup'>" +
                    "<b>👤 " + (name || "Без имени") + "</b><br>" +
                    "🚛 " + (plate || "Нет номера") +
                    "</div>";

                var newMarker = L.marker([lat, lon], { icon: truckIcon })
                    .addTo(map)
                    .bindPopup(popupContent);

                // ВАЖНО: Сохраняем по ID, а не по имени!
                drivers[deviceId] = newMarker;

                console.log("Водитель добавлен: " + deviceId);
            } catch (e) { console.error("Ошибка addDriver: " + e); }
        };

        // 2. Двигать водителя
        // Теперь принимаем deviceId вместо name
        window.moveDriver = function (deviceId, lat, lon) {
            try {
                // ВАЖНО: Ищем по ID
                var m = drivers[deviceId];
                if (m) {
                    m.setLatLng([lat, lon]);
                } else {
                    // Если маркера нет (например, страница перезагрузилась), 
                    // мы не можем вызвать addDriver, так как у нас тут нет 'name' и 'plate'.
                    // Поэтому просто ничего не делаем или пишем в лог.
                    console.warn("Маркер для движения не найден: " + deviceId);
                }
            } catch (e) { console.error("Ошибка moveDriver: " + e); }
        };

        // 3. Удалить водителя
        window.removeDriver = function (deviceId) {
            try {
                // ВАЖНО: Ищем по ID (это у вас уже было правильно)
                if (drivers[deviceId]) {
                    map.removeLayer(drivers[deviceId]);
                    delete drivers[deviceId];
                    console.log("Водитель удален: " + deviceId);
                } else {
                    console.log("Нечего удалять, ID не найден: " + deviceId);
                }
            } catch (e) {
                console.error("Ошибка при удалении водителя: " + e);
            }
        }

        // --- ЛОГИКА КЛИКА ПО КАРТЕ (ПОЛУЧЕНИЕ АДРЕСА) ---
        function setMarker(lat, lon, displayName) {
            if (marker) {
                map.removeLayer(marker);
            }
            marker = L.marker([lat, lon]).addTo(map);
            marker.bindPopup(displayName).openPopup();
        }

        map.on('click', function (e) {
            var lat = e.latlng.lat;
            var lon = e.latlng.lng;

            // Используем Nominatim для обратного геокодинга
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
                .then(response => response.json())
                .then(data => {
                    var address = data.display_name || "Адрес не найден";
                    setMarker(lat, lon, address);
                })
                .catch(error => {
                    setMarker(lat, lon, "Ошибка при получении адреса");
                });
        });

        function getSelectedLocation() {
            if (marker) {
                return JSON.stringify({
                    lat: marker.getLatLng().lat,
                    lon: marker.getLatLng().lng,
                    address: marker.getPopup().getContent()
                });
            } else {
                return JSON.stringify({ error: "Маркер не установлен" });
            }
        }


        // --- ЛОГИКА ОТОБРАЖЕНИЯ МАРШРУТА (ИЗ БД) ---
        window.displayRoute = function (geoJson) {
            try {
                // Очистка старого маршрута
                if (routeLayer) map.removeLayer(routeLayer);
                if (startMarker) map.removeLayer(startMarker);
                if (endMarker) map.removeLayer(endMarker);

                var data = typeof geoJson === 'string' ? JSON.parse(geoJson) : geoJson;

                routeLayer = L.geoJSON(data, {
                    style: {
                        color: '#3388ff',
                        weight: 5,
                        opacity: 0.8
                    },
                    onEachFeature: function (feature, layer) {
                        if (layer.pm) {
                            layer.pm.enable({
                                allowSelfIntersection: true,
                                draggable: false
                            });
                        }
                    }
                }).addTo(map);

                // Ставим маркеры начала и конца
                if (data.features && data.features.length > 0 && data.features[0].geometry.type === "LineString") {
                    var coords = data.features[0].geometry.coordinates;
                    if (coords.length > 1) {
                        var start = coords[0];
                        startMarker = L.marker([start[1], start[0]]).bindPopup("Начало").addTo(map);

                        var end = coords[coords.length - 1];
                        endMarker = L.marker([end[1], end[0]]).bindPopup("Конец").addTo(map);
                    }
                }

                // Зум на маршрут
                var bounds = routeLayer.getBounds();
                if (bounds.isValid()) {
                    map.fitBounds(bounds);
                }
            } catch (e) {
                console.error("Ошибка в displayRoute:", e.message);
            }
        };

        // --- ЛОГИКА СОХРАНЕНИЯ ИЗМЕНЕННОГО МАРШРУТА ---
        window.getEditedRouteGeoJson = function () {
            try {
                var lineCoordinates = [];

                map.eachLayer(function (layer) {
                    // Игнорируем маркеры, тайлы карты и служебные слои Geoman
                    if (layer.toGeoJSON && !layer._pmTempLayer && !(layer instanceof L.TileLayer) && !(layer instanceof L.Marker) && !(layer instanceof L.CircleMarker)) {

                        var geo = layer.toGeoJSON();

                        // Если это чистый LineString
                        if (geo.geometry && geo.geometry.type === 'LineString') {
                            // Добавляем координаты в наш общий массив
                            lineCoordinates = lineCoordinates.concat(geo.geometry.coordinates);
                        }
                        // Если линия пришла внутри FeatureCollection
                        else if (geo.type === 'FeatureCollection') {
                            geo.features.forEach(function (feature) {
                                if (feature.geometry && feature.geometry.type === 'LineString') {
                                    lineCoordinates = lineCoordinates.concat(feature.geometry.coordinates);
                                }
                            });
                        }
                    }
                });

                // Если линия не найдена, возвращаем пустую структуру
                if (lineCoordinates.length === 0) {
                    return JSON.stringify({ error: "Маршрут не найден на карте" });
                }

                // Формируем чистый объект LineString, как требует сервер
                var cleanLineString = {
                    "type": "LineString",
                    "coordinates": lineCoordinates
                };

                return JSON.stringify(cleanLineString);
            } catch (e) {
                return JSON.stringify({ error: e.message });
            }
        };

        var routePointsLayerGroup = L.layerGroup().addTo(map);

        window.displayRoutePointsBase64 = function (base64Str) {
            try {
                // Декодируем Base64
                var jsonString = decodeURIComponent(escape(window.atob(base64Str)));
                var points = JSON.parse(jsonString);

                routePointsLayerGroup.clearLayers();
                if (!points || points.length === 0) return;

                var validCount = 0;

                points.forEach(function (p) {
                    if (!p.coordinates || p.coordinates === "No data" || p.coordinates.trim() === "") return;

                    var coordsArr = p.coordinates.split(',').map(function (c) {
                        return parseFloat(c.trim());
                    });

                    if (coordsArr.length >= 2 && !isNaN(coordsArr[0]) && !isNaN(coordsArr[1])) {
                        var latLng = [coordsArr[0], coordsArr[1]];
                        var pointNumber = p.sequence_number || p.sequenceNumber || '?';

                        // Извлекаем данные клиента
                        var clientName = (p.client && p.client.name) ? p.client.name : "Неизвестный клиент";
                        var clientAddress = (p.client && p.client.address) ? p.client.address : "Адрес не указан";


                        var statusTranslations = {
                            'pending': 'Не вывезена',
                            'processed': 'Вывезена',
                            'failed': 'Срыв вывоза',
                            'in_progress': 'В процессе'
                        };

                        var displayStatus = statusTranslations[p.status] || p.status;
                        // Формируем расширенное содержимое попапа (по клику)
                        var popupContent = `
                    <div style="text-align:left; min-width: 150px; font-family: sans-serif;">
                        <div style="text-align:center; font-weight:bold; border-bottom: 1px solid #ccc; margin-bottom: 5px; padding-bottom: 5px;">
                            Точка №${pointNumber}
                        </div>
                        <b>Клиент:</b> ${clientName}<br>
                        <b>Адрес:</b> <span style="color: #2c3e50;">${clientAddress}</span><br>
                        <b>Кол-во конт:</b> <span style="color: #2c3e50;">${p.client.container_count}</span><br>

                        <b>Статус:</b> <i style="color: #7f8c8d;">${displayStatus}</i>
                    </div>
                `;

                        var isPrivate = p.client && (p.client.isPrivate === true || p.client.IsPrivate === true || p.client.is_private === true);

                        // 2. Выбираем CSS-класс в зависимости от значения
                        var colorClass = isPrivate ? 'marker-orange' : 'marker-yellow';

                        // 3. Добавляем цветной класс к нашему custom-point-marker
                        var numberedIcon = L.divIcon({
                            className: 'custom-point-marker ' + colorClass, // <-- Обратите внимание на пробел внутри строки!
                            html: pointNumber,
                            iconSize: [28, 28],
                            iconAnchor: [14, 14],
                            popupAnchor: [0, -14]
                        });

                        // Создаем маркер
                        var marker = L.marker(latLng, { icon: numberedIcon })
                            .bindPopup(popupContent);

                        console.log("Данные клиента для точки " + pointNumber + ":", p.client);

                        var isPrivate = false;

                        // Если объект клиента вообще существует
                        if (p.client) {
                            // Пытаемся достать значение из любого возможного варианта названия
                            var privValue = p.client.isPrivate || p.client.IsPrivate || p.client.is_private;

                            // Превращаем то, что пришло, в текст и проверяем (сработает и на true, и на "true", и на "True")
                            if (privValue === true || String(privValue).toLowerCase() === 'true') {
                                isPrivate = true;
                            }
                        }

                        // Выбираем CSS-класс
                        var colorClass = isPrivate ? 'marker-orange' : 'marker-yellow';
                       
                        // ОПЦИОНАЛЬНО: Добавляем подсказку при наведении (Tooltip)
                        marker.bindTooltip(displayStatus, {
                            direction: 'top',
                            offset: [0, -15]
                        });

                        routePointsLayerGroup.addLayer(marker);
                        validCount++;
                    }
                });

                if (validCount > 0) {
                    var groupBounds = L.featureGroup(routePointsLayerGroup.getLayers()).getBounds();
                    map.fitBounds(groupBounds, { padding: [50, 50] });
                }

            } catch (e) {
                console.error("Ошибка JS:", e.message);
            }
        };

    </script>
</body>
</html>
