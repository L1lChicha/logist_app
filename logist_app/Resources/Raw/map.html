<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Карта</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />

    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <style>
        #map {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
    <script>
        var map = L.map('map').setView([52.0976, 23.7341], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        map.pm.addControls({
            position: 'topleft',
            drawCircle: false,
            drawCircleMarker: false,
            drawRectangle: false,
            drawPolygon: false,
            drawMarker: false,      // Если нужно добавлять новые точки - поставь true
            drawPolyline: true,     // Разрешаем рисовать новые линии
            editMode: true,         // Разрешаем редактировать
            dragMode: false,
            cutPolygon: false,
            removalMode: true       // Разрешаем удалять
        });

        var marker, routeLayer, startMarker, endMarker;

        function setMarker(lat, lon, displayName) {
            if (marker) {
                map.removeLayer(marker);
            }
            marker = L.marker([lat, lon]).addTo(map);
            marker.bindPopup(displayName).openPopup();
        }

        map.on('click', function (e) {
            var lat = e.latlng.lat;
            var lon = e.latlng.lng;

            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
                .then(response => response.json())
                .then(data => {
                    var address = data.display_name || "Адрес не найден";
                    setMarker(lat, lon, address);
                })
                .catch(error => {
                    setMarker(lat, lon, "Ошибка при получении адреса");
                });
        });

        function getSelectedLocation() {
            if (marker) {
                return JSON.stringify({
                    lat: marker.getLatLng().lat,
                    lon: marker.getLatLng().lng,
                    address: marker.getPopup().getContent()
                });
            } else {
                return JSON.stringify({ error: "Маркер не установлен" });
            }
        }

        function displayRoute(geoJson) {
            try {
                // Удаляем предыдущий маршрут и маркеры
                if (routeLayer) map.removeLayer(routeLayer);
                if (startMarker) map.removeLayer(startMarker);
                if (endMarker) map.removeLayer(endMarker);

                var data = JSON.parse(geoJson);

                routeLayer = L.geoJSON(data, {
                    style: {
                        color: '#3388ff',
                        weight: 5,
                        opacity: 0.8
                    },
                    // ВАЖНО: Делаем слой редактируемым сразу
                    onEachFeature: function (feature, layer) {
                        // Разрешаем Geoman управлять этим слоем
                        // Теперь линию можно таскать за точки
                        if (layer.pm) {
                            layer.pm.enable({
                                allowSelfIntersection: true,
                                draggable: false // Саму линию таскать нельзя, только точки
                            });
                        }
                    }
                }).addTo(map);

                // Получаем точки начала и конца
                if (data.features.length > 0 && data.features[0].geometry.type === "LineString") {
                    var coords = data.features[0].geometry.coordinates;

                    if (coords.length > 1) {
                        // Начальная точка
                        var start = coords[0];
                        startMarker = L.marker([start[1], start[0]])
                            .bindPopup("Начало маршрута")
                            .addTo(map);

                        // Конечная точка
                        var end = coords[coords.length - 1];
                        endMarker = L.marker([end[1], end[0]])
                            .bindPopup("Конец маршрута")
                            .addTo(map);
                    }
                }

                // Устанавливаем границы карты
                var bounds = routeLayer.getBounds();
                map.fitBounds(bounds);
                map.invalidateSize();
            } catch (e) {
                console.error("Ошибка в displayRoute:", e.message);
                window.location = "debug://error?message=" + encodeURIComponent(e.message);
            }

        }
        window.getEditedRouteGeoJson = function () {
            try {
                var features = [];

                // Проходим по всем слоям на карте
                map.eachLayer(function (layer) {
                    // Ищем только линии (Polyline) и Маркеры
                    // Исключаем:
                    // 1. Служебные слои Geoman (_pmTempLayer)
                    // 2. Тайлы карты (L.TileLayer)
                    // 3. Если слой не имеет метода toGeoJSON

                    if (layer.toGeoJSON && !layer._pmTempLayer && !(layer instanceof L.TileLayer)) {

                        // Дополнительная проверка: не сохраняем пустые слои
                        var geo = layer.toGeoJSON();

                        // Если это FeatureCollection (группа), распаковываем
                        if (geo.type === 'FeatureCollection') {
                            features = features.concat(geo.features);
                        } else {
                            features.push(geo);
                        }
                    }
                });

                var collection = {
                    "type": "FeatureCollection",
                    "features": features
                };

                console.log("Собрано фич: " + features.length); // Увидите в F12

                // Возвращаем СТРОКУ, а не объект. WebView2 любит строки.
                return JSON.stringify(collection);

            } catch (e) {
                console.error("Ошибка в getEditedRouteGeoJson:", e);
                return JSON.stringify({ error: e.message });
            }
        };


    </script>
</body>
</html>
